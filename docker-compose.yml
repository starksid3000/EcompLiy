version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      # Override the DB URL from .env to connect to the docker postgres service
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ecompliy?schema=public
      # Frontend URL for OAuth redirect (Docker frontend runs on port 8080)
      - FRONTEND_URL=http://localhost:8080
      # Google OAuth callback must go through Nginx proxy, not directly to backend
      - GOOGLE_CALLBACK_URL=http://localhost:8080/api/v1/auth/google/callback
      
      # MinIO Configuration for Docker
      - MINIO_ENDPOINT=http://minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=992814560164-3q7atpv06bemgv5fgaaum5ur3egplt7s
      - MINIO_SECRET_KEY=992814560164-3q7atpv06bemgv5fgaaum5ur3egplt7s
      - MINIO_BUCKET=products
      - MINIO_PUBLIC_URL=http://localhost:9000
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

  db:
    # Using postgres:latest (will pull version 17/latest currently available on docker hub)
    # as PostgreSQL 18 has not been released yet officially as an image
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecompliy
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: 992814560164-3q7atpv06bemgv5fgaaum5ur3egplt7s
      MINIO_ROOT_PASSWORD: 992814560164-3q7atpv06bemgv5fgaaum5ur3egplt7s
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 992814560164-3q7atpv06bemgv5fgaaum5ur3egplt7s 992814560164-3q7atpv06bemgv5fgaaum5ur3egplt7s;
      /usr/bin/mc mb myminio/products --ignore-existing;
      /usr/bin/mc anonymous set download myminio/products;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
